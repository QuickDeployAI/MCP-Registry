syntax = "proto3";

package quickdeploy.fixture;

import "google/protobuf/struct.proto";

// Greeter service used by the grpc-2-mcp runtime fixture.
service Greeter {
  // Unary hello method exposed as an MCP tool.
  rpc SayHello(HelloRequest) returns (HelloReply);

  // Unary nested method used to prove proto3 JSON edge handling.
  rpc DescribeProfile(ProfileRequest) returns (ProfileReply);

  // Server streaming is exposed as a bounded progress-notification tool.
  rpc WatchHello(HelloRequest) returns (stream HelloReply);

  // Client streaming remains unsupported; grpc-2-mcp has no MCP-side primitive for it.
  rpc UploadHellos(stream HelloRequest) returns (HelloReply);

  // Bidirectional streaming remains unsupported for the same reason.
  rpc ChatHello(stream HelloRequest) returns (stream HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}

message ProfileRequest {
  string user_id = 1;
  int64 account_id = 2;
  repeated string tags = 3;
  map<string, string> metadata = 4;
  google.protobuf.Struct attributes = 5;
  oneof contact {
    string email = 6;
    string phone = 7;
  }
}

message ProfileReply {
  string summary = 1;
  int64 account_id = 2;
}
