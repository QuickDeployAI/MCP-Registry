apiVersion: quickdeploy.ai/v1
kind: McpManifest
metadata:
  name: ai.quickdeploy/petstore
  version: 1.0.0
  title: Petstore
  description: Selected Petstore operations exposed as MCP tools.
  labels:
    - openapi
    - petstore
spec:
  importer:
    engine: openapi-2-mcp
    versionRange: ^0.1.0
  source:
    type: http
    uri: https://petstore3.swagger.io/api/v3/openapi.json
  select:
    requests:
      - method: get
        uriTemplate: /pet/{petId}
      - method: post
        uriTemplate: /pet
  config:
    schema:
      type: object
      properties:
        baseUrl:
          type: string
    defaults:
      baseUrl: https://petstore3.swagger.io/api/v3
  expose:
    tools:
      - from: GET /pet/{petId}
        name: get_pet
      - from: POST /pet
        name: create_pet
deployment:
  transport: streamable-http
  auth:
    type: none
  userConfig:
    baseUrl:
      type: string
      description: Petstore API base URL.
  configSchema:
    type: object
    properties:
      baseUrl:
        type: string
